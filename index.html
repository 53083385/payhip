<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Product Store</title>

<script src="https://payhip.com/payhip.js"></script>

<style>

/* ===== THEME TOKENS ===== */

:root {
  --bg:        #f5f7fb;
  --surface:   #ffffff;
  --surface2:  #f1f5f9;
  --border:    #e2e8f0;
  --text:      #1f2937;
  --text-muted:#6b7280;
  --header-bg: #ffffff;
  --shadow:    rgba(0,0,0,.08);
  --drawer-bg: #ffffff;
}

[data-theme="dark"] {
  --bg:        #0f172a;
  --surface:   #1e293b;
  --surface2:  #273447;
  --border:    #334155;
  --text:      #f1f5f9;
  --text-muted:#94a3b8;
  --header-bg: #1e293b;
  --shadow:    rgba(0,0,0,.35);
  --drawer-bg: #1e293b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Arial, Helvetica, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background .3s, color .3s;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== BACKGROUND ANIMATION ===== */

.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ===== HEADER ===== */

header {
  background: var(--header-bg);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 3px 15px var(--shadow);
  transition: background .3s;
}

.header-inner {
  max-width: 100%;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: var(--text);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

button {
  border: none;
  cursor: pointer;
  border-radius: 10px;
  padding: 12px 18px;
  font-weight: bold;
  font-size: 14px;
  transition: opacity .2s, transform .1s;
}

button:active { transform: scale(.97); }

/* Theme toggle */
.theme-toggle {
  background: var(--surface2);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 50px;
  font-size: 18px;
  line-height: 1;
  border: 1px solid var(--border);
  transition: background .3s, color .3s;
}

.checkout-button {
  background: #16a34a;
  color: #fff;
}

/* ===== VIEW CART BUTTON + BADGE ===== */

.view-cart-btn {
  position: relative;
  display: flex;
  align-items: center;
  gap: 7px;
  background: #111827;
  color: #fff;
  padding: 10px 16px;
  font-size: 14px;
  font-weight: bold;
  border-radius: 10px;
  transition: background .2s, transform .1s;
}

[data-theme="dark"] .view-cart-btn {
  background: #334155;
  color: #f1f5f9;
}

.view-cart-btn:hover {
  background: #1f2937;
}

[data-theme="dark"] .view-cart-btn:hover {
  background: #475569;
}

.cart-badge {
  background: #ef4444;
  color: #fff;
  min-width: 20px;
  height: 20px;
  border-radius: 50px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 12px;
  font-weight: 800;
  padding: 0 5px;
  line-height: 1;
  transform: scale(1);
  transition: transform .15s cubic-bezier(.34,1.56,.64,1);
}

.cart-badge.pop {
  animation: badge-pop .35s cubic-bezier(.34,1.56,.64,1) forwards;
}

@keyframes badge-pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.55); }
  100% { transform: scale(1); }
}

/* ===== PAGE LAYOUT: desktop side-by-side ===== */

.page-body {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: flex-start;
  max-width: 100%;
  min-height: calc(100vh - 60px);
}

/* ===== PRODUCTS ===== */

.products-area {
  flex: 1 1 0;
  min-width: 0;
  padding: 30px 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
  gap: 24px;
  align-content: start;
}

.product-card {
  background: black;
  border: 3px solid #1e1002; /* dark orange */
  border-radius: 18px;
  overflow: visible;
  box-shadow: 0 10px 25px var(--shadow);
  transition: background .3s, box-shadow .3s;
  display: flex;
  flex-direction: column;
  position: relative;
}

.product-preview {
  height: 900px;
  overflow: hidden;
  flex-shrink: 0;
  border-radius: 18px 18px 0 0;
}

.product-preview .payhip-embed-page,
.product-preview .payhip-embed-page iframe {
  width: 100%;
  height: 100%;
}

.product-actions {
  padding: 16px 20px;
  text-align: center;
  background: #000000 !important;
  position: relative;
  bottom: 0;
  z-index: 20;
  border-radius: 0 0 18px 18px;
}

/* Hide "Buy Now" / purchase buttons inside Payhip iframes */
.payhip-embed-page iframe {
  pointer-events: none; /* prevent direct interaction that triggers buy */
}

/* ===== BRIGHT GOLD ADD TO CART ===== */

.add-button {
  background: linear-gradient(135deg, #f5c518 0%, #e6a800 100%);
  color: #1a1000;
  padding: 13px 40px;
  font-size: 15px;
  font-weight: 800;
  border-radius: 12px;
  box-shadow: 0 4px 14px rgba(230,168,0,.45);
  letter-spacing: .4px;
  transition: box-shadow .2s, transform .15s, background .2s;
}

.add-button:hover {
  box-shadow: 0 6px 20px rgba(230,168,0,.6);
  transform: translateY(-2px);
}

.add-button.selected {
  background: linear-gradient(135deg, #4ade80 0%, #16a34a 100%);
  color: #fff;
  box-shadow: 0 4px 14px rgba(22,163,74,.4);
}

/* ===== DESKTOP CART DRAWER (slides in from right) ===== */

.cart-sidebar {
  width: 380px;
  flex-shrink: 0;
  position: fixed;
  top: 0;
  right: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--drawer-bg);
  border-left: 1px solid var(--border);
  box-shadow: -6px 0 30px var(--shadow);
  transition: transform .35s cubic-bezier(.4,0,.2,1), background .3s;
  transform: translateX(100%);
  z-index: 400;
}

.cart-sidebar.cart-open {
  transform: translateX(0);
}

.cart-header {
  padding: 18px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

.cart-header h2 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}

/* Close button — always visible in drawer */
#closeCart {
  display: block;
  background: var(--surface2);
  color: var(--text);
  padding: 8px 12px;
  font-size: 16px;
  border-radius: 8px;
}

/* Drawer overlay (desktop + mobile) */
.cart-mobile-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 399;
}

.cart-mobile-overlay.active {
  display: block;
}

.cart-items {
  flex: 1;
  padding: 14px;
  overflow-y: auto;
}

.cart-empty {
  color: var(--text-muted);
  text-align: center;
  margin-top: 40px;
  font-size: 15px;
}

/* Cart item with image */
.cart-item {
  border: 1px solid var(--border);
  padding: 11px;
  margin-bottom: 10px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  transition: background .3s;
}

.cart-item-img {
  width: 56px;
  height: 56px;
  object-fit: cover;
  border-radius: 8px;
  flex-shrink: 0;
  background: var(--border);
}

.cart-item-info {
  flex: 1;
  min-width: 0;
}

.cart-item-name {
  font-weight: 700;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cart-item-price {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 3px;
}

.remove-button {
  background: #dc2626;
  color: #fff;
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 8px;
  flex-shrink: 0;
}

/* Totals */
.cart-totals {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
  transition: background .3s;
}

.totals-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 5px;
}

.totals-row.grand {
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  margin-top: 9px;
  padding-top: 9px;
  border-top: 2px solid var(--border);
  margin-bottom: 0;
}

.totals-row span:last-child { font-weight: 600; color: var(--text); }
.totals-row.grand span:last-child { color: #e6a800; }

.cart-footer {
  padding: 14px;
  border-top: 1px solid var(--border);
}

.checkout-link {
  display: block;
  text-align: center;
  background: #16a34a;
  color: #fff;
  padding: 14px;
  text-decoration: none;
  border-radius: 10px;
  font-weight: bold;
  margin-bottom: 8px;
  font-size: 14px;
  transition: opacity .2s;
}

.checkout-link:hover { opacity: .88; }

.clear-button {
  width: 100%;
  background: #6b7280;
  color: #fff;
}

/* Fly animation */
.fly-product {
  position: fixed;
  width: 60px;
  height: 60px;
  background: #e6a800;
  border-radius: 12px;
  z-index: 99999;
  pointer-events: none;
  transition: .75s ease;
}

/* ===== MOBILE: bottom-sheet cart ===== */

@media (max-width: 768px) {

  .cart-sidebar {
    top: auto;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 75vh;
    border-left: none;
    border-top: 2px solid var(--border);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -6px 30px rgba(0,0,0,.18);
    /* Override the right-slide transform with bottom-slide */
    transform: translateY(100%);
    transition: transform .35s ease, background .3s;
    z-index: 500;
  }

  .cart-sidebar.cart-open {
    transform: translateY(0);
  }

  .cart-mobile-overlay { z-index: 499; }

  /* Products area: full width, tighter */
  .products-area {
    grid-template-columns: 1fr;
    padding: 16px 12px;
    gap: 16px;
  }

  /* Shorter product preview on mobile */
  .product-preview {
      background: #000000;
    height: 780px;
    overflow: hidden;
  }

.product-actions {
  padding: 12px 16px;
  background-color: #000;
}

  .add-button {
    padding: 11px 32px;
    font-size: 14px;
  }

}

</style>
</head>

<script>

/* ===== HIDE PAYHIP "BUY NOW" BUTTONS ===== */

(function hideBuyNow(){
  function injectStyle(doc){
    try {
      const s = doc.createElement("style");
      s.textContent =
        'a[href*="payhip.com/b/"],button[class*="buy"],a[class*="buy"],' +
        '.buy-now,.buy-button,[data-cy="buy-btn"],[data-cy="purchase-btn"],' +
        '.product-page__purchase-block button,' +
        '.payhip-btn-buy { display: none !important; }';
      (doc.head || doc.documentElement).appendChild(s);
    } catch(e){}
  }

  /* Inject into every iframe that loads a payhip page */
  function processFrame(iframe){
    try {
      injectStyle(iframe.contentDocument || iframe.contentWindow.document);
    } catch(e){}
  }

  document.querySelectorAll("iframe").forEach(processFrame);

  const observer = new MutationObserver(muts => {
    muts.forEach(m => {
      m.addedNodes.forEach(node => {
        if(node.tagName === "IFRAME") processFrame(node);
        if(node.querySelectorAll){
          node.querySelectorAll("iframe").forEach(processFrame);
        }
      });
    });
  });

  observer.observe(document.body, { childList: true, subtree: true });

  /* Re-run every second for iframes that load late */
  let attempts = 0;
  const interval = setInterval(() => {
    document.querySelectorAll("iframe").forEach(processFrame);
    if(++attempts > 20) clearInterval(interval);
  }, 1000);
})();


/* ===== BACKGROUND ANIMATION ===== */

(function(){
  const canvas = document.getElementById("bgCanvas");
  const ctx    = canvas.getContext("2d");
  let W, H, particles = [];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function randBetween(a, b){ return a + Math.random()*(b-a); }

  function createParticle(){
    return {
      x:     Math.random() * (W || 800),
      y:     Math.random() * (H || 600),
      r:     randBetween(1.5, 4),
      dx:    randBetween(-.35, .35),
      dy:    randBetween(-.35, .35),
      alpha: randBetween(.08, .22)
    };
  }

  function init(){
    resize();
    particles = [];
    const count = Math.floor((W * H) / 14000);
    for(let i = 0; i < count; i++) particles.push(createParticle());
  }

  function getColor(){
    return document.documentElement.getAttribute("data-theme") === "dark"
      ? "200,180,60" : "100,130,220";
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);
    const col = getColor();

    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = "rgba("+col+","+p.alpha+")";
      ctx.fill();
      p.x += p.dx;
      p.y += p.dy;
      if(p.x < -10)  p.x = W + 10;
      if(p.x > W+10) p.x = -10;
      if(p.y < -10)  p.y = H + 10;
      if(p.y > H+10) p.y = -10;
    });

    for(let i = 0; i < particles.length; i++){
      for(let j = i+1; j < particles.length; j++){
        const dx   = particles[i].x - particles[j].x;
        const dy   = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 120){
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = "rgba("+col+","+(0.06*(1-dist/120))+")";
          ctx.lineWidth = .8;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener("resize", init);
  init();
  draw();
})();


/* ===== LIGHT / DARK TOGGLE ===== */

const themeToggle = document.getElementById("themeToggle");
themeToggle.addEventListener("click", function(){
  const html   = document.documentElement;
  const isDark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", isDark ? "light" : "dark");
  themeToggle.textContent = isDark ? "\u263D" : "\u2600";
});


/* ===== CART DRAWER (desktop right-slide + mobile bottom-sheet) ===== */

const cartSidebar       = document.getElementById("cartSidebar");
const cartMobileOverlay = document.getElementById("cartMobileOverlay");

function isMobile(){ return window.innerWidth <= 768; }

function openCart(){
  cartSidebar.classList.add("cart-open");
  cartMobileOverlay.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeCart(){
  cartSidebar.classList.remove("cart-open");
  cartMobileOverlay.classList.remove("active");
  document.body.style.overflow = "";
}

document.getElementById("viewCartBtn").addEventListener("click", openCart);
document.getElementById("closeCart").addEventListener("click", closeCart);
cartMobileOverlay.addEventListener("click", closeCart);


/* ===== CART LOGIC ===== */

const TAX_RATE = 0.15;
let cart = [];

const cartCountEl  = document.getElementById("cartCount");
const cartItemsEl  = document.getElementById("cartItems");
const cartTotalsEl = document.getElementById("cartTotals");
const subtotalEl   = document.getElementById("subtotalVal");
const taxEl        = document.getElementById("taxVal");
const totalEl      = document.getElementById("totalVal");

function formatZAR(val){
  return "ZAR " + val.toFixed(2);
}

function buildCheckoutUrl(){
  if(cart.length === 0) return "#";
  return "https://payhip.com/buy?" +
    cart.map(item => "cart_links[]=" + item.id).join("&");
}

function updateCart(){
  const prevCount = parseInt(cartCountEl.textContent) || 0;
  cartCountEl.textContent = cart.length;
  /* Animate badge when count increases */
  if(cart.length > prevCount){
    cartCountEl.classList.remove("pop");
    void cartCountEl.offsetWidth; /* reflow to restart animation */
    cartCountEl.classList.add("pop");
  }
  document.getElementById("checkoutButton").textContent = "Checkout (" + cart.length + ")";
  document.getElementById("checkoutLink").href = buildCheckoutUrl();

  if(cart.length === 0){
    cartItemsEl.innerHTML = '<p class="cart-empty">Your cart is empty</p>';
    cartTotalsEl.style.display = "none";
    return;
  }

  cartItemsEl.innerHTML = cart.map(item => `
    <div class="cart-item">
      <img class="cart-item-img"
           src="${item.img}"
           alt="${item.name}"
           onerror="this.style.display='none'">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${formatZAR(item.price)}</div>
      </div>
      <button class="remove-button" onclick="removeItem('${item.id}')">Remove</button>
    </div>
  `).join("");

  const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
  const tax      = subtotal * TAX_RATE;
  const total    = subtotal + tax;

  subtotalEl.textContent = formatZAR(subtotal);
  taxEl.textContent      = formatZAR(tax);
  totalEl.textContent    = formatZAR(total);
  cartTotalsEl.style.display = "block";
}

function removeItem(id){
  cart = cart.filter(item => item.id !== id);
  const btn = document.querySelector('[data-id="' + id + '"] .add-button');
  if(btn){
    btn.textContent = "Add To Cart";
    btn.classList.remove("selected");
  }
  updateCart();
}

function animateCart(card){
  const start = card.getBoundingClientRect();
  const target = document.getElementById("viewCartBtn").getBoundingClientRect();

  const fly = document.createElement("div");
  fly.className = "fly-product";
  fly.style.left = start.left + "px";
  fly.style.top  = start.top  + "px";
  document.body.appendChild(fly);

  requestAnimationFrame(() => {
    fly.style.left      = target.left + "px";
    fly.style.top       = target.top  + "px";
    fly.style.transform = "scale(.1)";
    fly.style.opacity   = "0";
  });

  setTimeout(() => fly.remove(), 800);
}

document.querySelectorAll(".add-button").forEach(button => {
  button.addEventListener("click", function(){
    const card  = this.closest(".product-card");
    const id    = card.dataset.id;
    const name  = card.dataset.name;
    const price = parseFloat(card.dataset.price) || 0;
    const img   = card.dataset.img || "";

    if(cart.some(item => item.id === id)) return;

    cart.push({ id, name, price, img });
    this.innerHTML = "Added &#10003;";
    this.classList.add("selected");

    animateCart(card);
    updateCart();

    /* On mobile, open the cart after adding */
    if(isMobile()) openCart();
  });
});

function openCheckout(){
  const url = buildCheckoutUrl();
  if(url === "#"){ alert("Cart is empty"); return; }
  const W2 = 1200, H2 = 900;
  const left = (screen.width  - W2) / 2;
  const top  = (screen.height - H2) / 2;
  window.open(url, "PayhipCheckout",
    "width="+W2+",height="+H2+",left="+left+",top="+top+",resizable=yes,scrollbars=yes");
}

document.getElementById("checkoutButton").addEventListener("click", openCheckout);
document.getElementById("checkoutLink").addEventListener("click", function(e){
  e.preventDefault();
  openCheckout();
});

document.getElementById("clearCart").addEventListener("click", function(){
  cart = [];
  document.querySelectorAll(".add-button").forEach(btn => {
    btn.textContent = "Add To Cart";
    btn.classList.remove("selected");
  });
  updateCart();
});

updateCart();

</script>
